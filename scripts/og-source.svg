  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0a0e16"/>
  <rect width="1200" height="630" fill="url(#g)" opacity="0.06"/>

  <!-- icon, scaled from the 512 viewBox: translate then scale (360/512 = 0.703) -->
